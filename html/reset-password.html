<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CodeCraft</title>
    <link rel="stylesheet" href="../style/login.css"> <!-- Reuse login styles -->
</head>
<body>
<main class="login-card">
    <section class="form-section">
        <div class="header">
            <h1>Create a New Password</h1>
            <p>Your new password must be different from previous passwords.</p>
        </div>
        <form id="reset-password-form">
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="••••••••" required>
            </div>
            <div class="input-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Reset Password</button>
        </form>
    </section>
    <section class="image-section"></section>
</main>
<script>
    document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
            return alert('Passwords do not match!');
        }

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            return alert('Invalid or missing reset token.');
        }

        const button = e.target.querySelector('button');
        button.disabled = true;
        button.textContent = 'Resetting...';

        try {
            const response = await fetch(`http://localhost:5000/api/auth/resetpassword/${token}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: newPassword })
            });
            const result = await response.json();
            alert(result.message);
            if (response.ok) {
                window.location.href = 'login.html';
            }
        } catch (error) {
            alert('An error occurred. Please try again.');
        } finally {
            button.disabled = false;
            button.textContent = 'Reset Password';
        }
    });
</script>
    <script src="../script/nav.js" defer></script>
    <script src="../script/auth.js" defer></script>
</body>
</html>
