<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CodeCraft</title>
    <link rel="stylesheet" href="../style/login.css"> <!-- إعادة استخدام أنماط تسجيل الدخول -->
</head>
<body>
<main class="login-card">
    <section class="form-section">
        <div class="header">
            <h1>Forgot Your Password?</h1>
            <p>No problem. Enter your email address below and we'll send you a link to reset it.</p>
        </div>
        <form id="forgot-password-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>
            <button type="submit" class="login-btn">Send Reset Link</button>
        </form>
        <p class="footer-text">
            Remembered your password?
            <a href="./login.html">Back to Login</a>
        </p>
    </section>
    <section class="image-section"></section>
</main>
<script>
    document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const button = e.target.querySelector('button');
        button.disabled = true;
        button.textContent = 'Sending...';

        try {
            // هني نجيب ملف الرجال وعلومه الشخصية، عشان نعرف مع مين نسولف
            const response = await fetch('http://localhost:5000/api/auth/forgotpassword', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const result = await response.json();
            alert(result.message); // إظهار رسالة النجاح/الخطأ من السيرفر
        } catch (error) {
            alert('An error occurred. Please try again.');
        } finally {
            button.disabled = false;
            button.textContent = 'Send Reset Link';
        }
    });
</script>
    <script src="../script/nav.js" defer></script>
    <script src="../script/auth.js" defer></script>
</body>
</html>
