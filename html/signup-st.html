<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codecraft | Join</title>
    <link rel="stylesheet" href="../style/signup.css">
    <style>
        /* لضمان ظهور كل المحتوى، سنجعل الحاوية قابلة للتمدد. */
        .box {
            height: auto;
            min-height: 600px; /* حد أدنى للارتفاع لتبدو جيدة على الشاشات الكبيرة */
        }
        .form-side {
            padding-bottom: 25px; /* إضافة بعض المسافة بالأسفل */
        }
    </style>
</head>

<body>

    <div class="box">
        <div class="form-side">
            <h2>Create Account</h2>
            <p>Join our community</p>

            <div class="type-select">
                <div class="type-item">
                    <input type="radio" name="role" id="doc" value="doctor">
                    <label for="doc"><a href="./signup-dr.html" style="text-decoration: none;">Instructor</a></label>
                </div>

                <div class="type-item">
                    <input type="radio" name="role" id="stu" value="student" checked>
                    <label for="stu" style="color:#ff00ff; border: solid #ff00ff2d;">Student</label>
                </div>
            </div>

            <form id="sign_st">
                <div class="field full">
                    <label>First Name</label>
                    <input type="text" name="fname" required>
                </div>
                <div class="field full">
                    <label>Last Name</label>
                    <input type="text" name="lname" required>
                </div>

                <div class="field full">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>

            <div class="field full">
                <label>Phone Number</label>
                <input type="text" name="phone" required>
            </div>

                <div class="field full">
                    <label>Password</label>
                    <input type="password" name="pass" required>
                </div>

                <div class="field full">
                    <label>Confirm</label>
                    <input type="password" name="cpass" required>
                </div>

                <div class="agre">
                    <input type="checkbox" id="agree" name="agree" required>
                    <label for="agree">I agree to the <a href="./terms.html">Terms</a></label>
                </div>

                <button type="submit" class="btn">Sign Up</button>
            </form>
            <p class="footer-text">
                Already have an account?
                <a href="./login.html">log in</a>
            </p>
        </div>

        <div class="img-side"></div>
    </div>

    <script src="../script/acount.js"></script>

    <script src="../script/nav.js" defer></script>
    <script src="../script/auth.js" defer></script>
</body>

</html>
